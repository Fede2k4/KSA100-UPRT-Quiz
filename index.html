<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AELO KSA100 - UPRT TEST</title>
    <style>
        :root {
            --aelo-red: #E31D2B; 
            --primary: var(--aelo-red);
            --secondary: #A0151E;
            --success: #11998e;
            --danger: #FF6B6B; 
            --dark: #2c3e50;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--aelo-red); 
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--dark);
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        .logo-main {
            max-width: 80%;
            height: auto;
            margin-bottom: 25px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        input[type="text"] {
            width: 80%;
            padding: 12px;
            margin: 20px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            font-weight: bold;
        }

        button:hover { opacity: 0.9; transform: translateY(-2px); }

        .timer-bar {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .timer-progress {
            height: 100%;
            background: var(--danger);
            width: 100%;
            transition: width 0.1s linear; 
        }

        .quiz-image {
            max-width: 100%;
            max-height: 250px;
            height: auto;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: none;
        }

        #question-text {
            text-transform: uppercase;
            font-size: 1.2rem;
            margin: 15px 0;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .option-btn {
            background: #f0f2f5;
            color: var(--dark);
            border: 2px solid #e4e6eb;
            padding: 15px;
            font-weight: 600;
            text-align: left;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.15s;
            text-transform: uppercase;
        }

        .option-btn:hover { 
            background: var(--primary); 
            color: white;
            border-color: var(--primary);
        }

        .results-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed var(--primary);
            margin-top: 20px;
            font-family: monospace;
            white-space: pre-wrap;
            text-align: left;
            font-size: 14px;
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="screen-login" class="screen active">
            <img src="https://lh3.googleusercontent.com/d/1Xg7X85x38pZ0N586Z795pZ6442654316" alt="AELO Swiss Academy" class="logo-main" onerror="this.src='logo.png';">
            <h2>KSA 100 - UPRT TEST</h2>
            <p>Enter your full name to start the timed quiz<br>(10 seconds per question).</p>
            <input type="text" id="student-name" placeholder="Full Name" required>
            <br>
            <button onclick="startQuiz()">Start Test</button>
        </div>

        <div id="screen-quiz" class="screen">
            <div class="timer-bar"><div id="timer" class="timer-progress"></div></div>
            <img id="quiz-img" class="quiz-image" src="" alt="Quiz Image" onerror="this.style.display='none';">
            <h3 id="question-text">QUESTION...</h3>
            <div class="options-grid" id="options-container"></div>
        </div>

        <div id="screen-results" class="screen">
            <h2>QUIZ COMPLETED!</h2>
            <p id="final-score">You have finished the test.</p>
            <p>Copy the report below or save the PDF to send to your instructor:</p>
            <div class="results-box" id="results-code"></div>
            <br>
            <button onclick="window.print()">Save / Print PDF</button>
        </div>
    </div>

    <script>
        // Database fisso delle domande originarie
        const masterQuizData = [
            {
                question: "WHAT IS THE RECOVERY FOR THIS SITUATION?",
                image: "assetto1.png", 
                options: [
                    "PUSH TO UNLOAD, WINGS LEVELLED, PITCH UP AND INCREASE THROTTLE",
                    "DECREASE THROTTLE, PITCH UP",
                    "DECREASE THROTTLE, WINGS LEVELLED, PITCH UP AND ADJUST THROTTLE",
                    "PUSH TO UNLOAD, PITCH UP AND INCREASE THROTTLE"
                ],
                correctText: "DECREASE THROTTLE, WINGS LEVELLED, PITCH UP AND ADJUST THROTTLE", // C
                time: 10 
            },
            {
                question: "WHAT IS THE RECOVERY FOR THIS SITUATION?",
                image: "assetto2.png", 
                options: [
                    "PUSH TO UNLOAD, WINGS LEVELLED, PITCH UP AND ADJUST THROTTLE",
                    "WINGS LEVELLED, PUSH TO UNLOAD, PITCH UP AND INCREASE THROTTLE",
                    "THROTTLE IDLE, WINGS LEVELLED, PITCH UP",
                    "PUSH TO UNLOAD, INCREASE THROTTLE, WINGS LEVELLED, PITCH UP"
                ],
                correctText: "PUSH TO UNLOAD, WINGS LEVELLED, PITCH UP AND ADJUST THROTTLE", // A
                time: 10 
            },
            {
                question: "WHICH UPSET IS THIS?",
                image: "assetto3.png", 
                options: [
                    "NOSE HIGH",
                    "NOSE HIGH AND BANK",
                    "NOT UPSET",
                    "STALL"
                ],
                correctText: "NOT UPSET", // C
                time: 10 
            },
            {
                question: "WHAT IS THE RECOVERY FOR THIS SITUATION?",
                image: "assetto4.png", 
                options: [
                    "PULL TO UNLOAD, WINGS LEVELLED, PITCH UP AND INCREASE THROTTLE",
                    "PUSH TO UNLOAD, WINGS LEVELLED, PITCH UP",
                    "PUSH TO UNLOAD, WINGS LEVELLED, PITCH UP",
                    "PUSH TO UNLOAD, WINGS LEVELLED, PITCH UP AND INCREASE THROTTLE"
                ],
                correctText: "PUSH TO UNLOAD, WINGS LEVELLED, PITCH UP AND INCREASE THROTTLE", // D
                time: 10 
            },
            {
                question: "WHAT IS THE RECOVERY FOR THIS SITUATION?",
                image: "assetto5.png", 
                options: [
                    "PULL TO UNLOAD, WINGS LEVELLED, PITCH UP AND DECREASE THROTTLE",
                    "PUSH TO UNLOAD, WINGS LEVELLED, PITCH UP",
                    "PULL TO UNLOAD WINGS LEVELLED, PITCH UP",
                    "PUSH TO UNLOAD, WINGS LEVELLED, PITCH UP AND INCREASE THROTTLE"
                ],
                correctText: "PUSH TO UNLOAD, WINGS LEVELLED, PITCH UP AND INCREASE THROTTLE", // D
                time: 10 
            },
            {
                question: "WHICH UPSET IS THIS?",
                image: "assetto6.png", 
                options: [
                    "NOSE LOW",
                    "NOT UPSET",
                    "NOSE LOW AND BANK",
                    "DEEP DIVE"
                ],
                correctText: "NOT UPSET", // B
                time: 10 
            }
        ];

        let quizData = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let studentName = "";
        let timerInterval;
        let timeLeft = 0;

        // Algoritmo di mescolamento Fisher-Yates
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function prepareQuizData() {
            // Clona la lista principale per non corromperla tra un tentativo e l'altro
            let clonedData = JSON.parse(JSON.stringify(masterQuizData));
            
            // 1. Mischia le domande principali
            shuffle(clonedData);
            
            // 2. Mischia le opzioni dentro ogni singola domanda
            clonedData.forEach(item => {
                shuffle(item.options);
            });
            
            return clonedData;
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function startQuiz() {
            studentName = document.getElementById('student-name').value.trim();
            if (!studentName) {
                alert("Please enter your name.");
                return;
            }
            
            // Genera una sequenza casuale unica per questo specifico tentativo
            quizData = prepareQuizData();
            currentQuestionIndex = 0;
            score = 0;
            
            showScreen('screen-quiz');
            loadQuestion();
        }

        function loadQuestion() {
            clearInterval(timerInterval);
            if (currentQuestionIndex >= quizData.length) {
                endQuiz();
                return;
            }

            const currentQuestion = quizData[currentQuestionIndex];
            document.getElementById('question-text').innerText = `${currentQuestionIndex + 1}. ${currentQuestion.question}`;
            
            const imgElement = document.getElementById('quiz-img');
            if (currentQuestion.image && currentQuestion.image !== "") {
                imgElement.src = currentQuestion.image;
                imgElement.style.display = "inline-block";
            } else {
                imgElement.style.display = "none";
            }

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            currentQuestion.options.forEach((option) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = option;
                btn.onclick = () => selectAnswer(option);
                optionsContainer.appendChild(btn);
            });

            timeLeft = currentQuestion.time * 1000;
            updateTimerBar();
            
            const tickRate = 100; 
            timerInterval = setInterval(() => {
                timeLeft -= tickRate;
                updateTimerBar();
                if (timeLeft <= 0) {
                    selectAnswer(""); // Tempo scaduto, nessuna stringa passata
                }
            }, tickRate);
        }

        function updateTimerBar() {
            const totalTime = quizData[currentQuestionIndex].time * 1000;
            const percentage = Math.max(0, (timeLeft / totalTime) * 100);
            document.getElementById('timer').style.width = percentage + '%';
        }

        function selectAnswer(selectedOptionText) {
            clearInterval(timerInterval);
            const currentQuestion = quizData[currentQuestionIndex];
            
            // Verifica la correttezza confrontando il testo della risposta, infallibile contro il random
            const isCorrect = selectedOptionText === currentQuestion.correctText;
            
            if (isCorrect) score++;

            currentQuestionIndex++;
            loadQuestion();
        }

        function endQuiz() {
            showScreen('screen-results');
            
            const percentageScore = Math.round((score / quizData.length) * 100);
            
            document.getElementById('final-score').innerText = `Well done, ${studentName.toUpperCase()}! You have successfully completed the test.`;
            
            let resultString = `STUDENT: ${studentName.toUpperCase()}\n`;
            resultString += `DATE: ${new Date().toLocaleString()}\n`;
            resultString += `FINAL SCORE: ${percentageScore}% CORRECT ANSWERS (${score}/${quizData.length})`;

            document.getElementById('results-code').innerText = resultString;
        }
    </script>
</body>
</html>
