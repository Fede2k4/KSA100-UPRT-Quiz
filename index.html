<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upset Recovery Quiz</title>
    <style>
        :root {
            --primary: #4a00e0;
            --secondary: #8e2de2;
            --success: #11998e;
            --danger: #eb3349;
            --dark: #2c3e50;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--dark);
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        input[type="text"] {
            width: 80%;
            padding: 12px;
            margin: 20px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { opacity: 0.9; transform: translateY(-2px); }

        .timer-bar {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .timer-progress {
            height: 100%;
            background: var(--danger);
            width: 100%;
            transition: width 0.1s linear; 
        }

        .quiz-image {
            max-width: 100%;
            max-height: 250px;
            height: auto;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: none;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .option-btn {
            background: #f0f2f5;
            color: var(--dark);
            border: 2px solid #e4e6eb;
            padding: 15px;
            font-weight: 600;
            text-align: left;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.15s;
        }

        .option-btn:hover { 
            background: var(--primary); 
            color: white;
            border-color: var(--primary);
        }

        .results-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed var(--primary);
            margin-top: 20px;
            font-family: monospace;
            white-space: pre-wrap;
            text-align: left;
            font-size: 14px;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="screen-login" class="screen active">
            <h2>Upset Recovery Test</h2>
            <p>Inserisci il tuo nome e cognome per iniziare il quiz a tempo (6 secondi per domanda).</p>
            <input type="text" id="student-name" placeholder="Nome Cognome" required>
            <br>
            <button onclick="startQuiz()">Inizia il Test</button>
        </div>

        <div id="screen-quiz" class="screen">
            <div class="timer-bar"><div id="timer" class="timer-progress"></div></div>
            <img id="quiz-img" class="quiz-image" src="" alt="Quiz Image" onerror="this.style.display='none';">
            <h3 id="question-text">Domanda...</h3>
            <div class="options-grid" id="options-container"></div>
        </div>

        <div id="screen-results" class="screen">
            <h2>Quiz Completato!</h2>
            <p id="final-score">Hai totalizzato X punti.</p>
            <p>Copia il testo nel riquadro qui sotto o salva il PDF per inviarlo al docente:</p>
            <div class="results-box" id="results-code"></div>
            <br>
            <button onclick="window.print()">Salva / Stampa PDF</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "What is the recovery for this situation?",
                image: "assetto1.png", 
                options: [
                    "PUSH TO UNLOAD, WINGS LEVELLED, PITCH UP AND INCREASE THROTTLE",
                    "DECREASE THROTTLE, PITCH UP",
                    "DECREASE THROTTLE, WINGS LEVELLED, PITCH UP AND ADJUST THROTTLE",
                    "PUSH TO UNLOAD, PITCH UP AND INCREASE THROTTLE"
                ],
                correct: 0, 
                time: 6 
            },
            {
                question: "What is the recovery for this situation?",
                image: "assetto2.png", 
                options: [
                    "PUSH TO UNLOAD, WINGS LEVELLED, PITCH UP AND DECREASE THROTTLE",
                    "WINGS LEVELLED, PUSH TO UNLOAD, PITCH UP AND INCREASE THROTTLE",
                    "THROTTLE IDLE, WINGS LEVELLED, PITCH UP",
                    "PUSH TO UNLOAD, INCREASE THROTTLE, WINGS LEVELLED, PITCH UP"
                ],
                correct: 2, 
                time: 6 
            },
            {
                question: "Which upset is this?",
                image: "assetto3.png", 
                options: [
                    "NOSE HIGH",
                    "NOSE HIGH AND BANK",
                    "NOT UPSET",
                    "STALL"
                ],
                correct: 0, 
                time: 6 
            },
            {
                question: "What is the recovery for this situation?",
                image: "assetto4.png", 
                options: [
                    "PULL TO UNLOAD, WINGS LEVELLED, PITCH UP AND INCREASE THROTTLE",
                    "PUSH TO UNLOAD, WINGS LEVELLED, PITCH UP",
                    "PULL TO UNLO WINGS LEVELLED, PITCH UP",
                    "PUSH TO UNLOAD, WINGS LEVELLED, PITCH UP AND INCREASE THROTTLE"
                ],
                correct: 3, 
                time: 6 
            },
            {
                question: "Which upset is this?",
                image: "assetto5.png", 
                options: [
                    "NOSE LOW",
                    "NOT UPSET",
                    "NOSE LOW AND BANK",
                    "DEEP DIVE"
                ],
                correct: 0, 
                time: 6 
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let studentName = "";
        let timerInterval;
        let timeLeft = 0;
        let studentAnswers = [];

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function startQuiz() {
            studentName = document.getElementById('student-name').value.trim();
            if (!studentName) {
                alert("Per favore, inserisci il tuo nome.");
                return;
            }
            showScreen('screen-quiz');
            loadQuestion();
        }

        function loadQuestion() {
            clearInterval(timerInterval);
            if (currentQuestionIndex >= quizData.length) {
                endQuiz();
                return;
            }

            const currentQuestion = quizData[currentQuestionIndex];
            document.getElementById('question-text').innerText = `${currentQuestionIndex + 1}. ${currentQuestion.question}`;
            
            const imgElement = document.getElementById('quiz-img');
            if (currentQuestion.image && currentQuestion.image !== "") {
                imgElement.src = currentQuestion.image;
                imgElement.style.display = "inline-block";
            } else {
                imgElement.style.display = "none";
            }

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            currentQuestion.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = option;
                btn.onclick = () => selectAnswer(index);
                optionsContainer.appendChild(btn);
            });

            timeLeft = currentQuestion.time * 1000;
            updateTimerBar();
            
            const tickRate = 100; 
            timerInterval = setInterval(() => {
                timeLeft -= tickRate;
                updateTimerBar();
                if (timeLeft <= 0) {
                    selectAnswer(-1); 
                }
            }, tickRate);
        }

        function updateTimerBar() {
            const totalTime = quizData[currentQuestionIndex].time * 1000;
            const percentage = Math.max(0, (timeLeft / totalTime) * 100);
            document.getElementById('timer').style.width = percentage + '%';
        }

        function selectAnswer(selectedIndex) {
            clearInterval(timerInterval);
            const currentQuestion = quizData[currentQuestionIndex];
            const isCorrect = selectedIndex === currentQuestion.correct;
            
            if (isCorrect) score++;

            studentAnswers.push({
                question: currentQuestion.question,
                studentAnswer: selectedIndex === -1 ? "Tempo Scaduto" : currentQuestion.options[selectedIndex],
                correctAnswer: currentQuestion.options[currentQuestion.correct],
                status: isCorrect ? "CORRETTA" : "ERRATA"
            });

            currentQuestionIndex++;
            loadQuestion();
        }

        function endQuiz() {
            showScreen('screen-results');
            document.getElementById('final-score').innerText = `Ottimo lavoro ${studentName}! Punteggio finale: ${score} / ${quizData.length}`;
            
            let resultString = `STUDENTE: ${studentName}\nDATA DI SVOLGIMENTO: ${new Date().toLocaleString()}\nPUNTEGGIO GENERALE: ${score}/${quizData.length}\n\nRELAZIONE DI DETTAGLIO:\n`;
            studentAnswers.forEach((ans, idx) => {
                resultString += `${idx+1}) ${ans.question}\n   Risposta data dallo studente: ${ans.studentAnswer} [${ans.status}]\n`;
            });

            document.getElementById('results-code').innerText = resultString;
        }
    </script>
</body>
</html>
